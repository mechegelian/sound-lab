<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sound Lab</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell">

    <header class="panel title-panel">
      <h1>sound L A B</h1>
      <p>super experimental browser performance synth playground by Mehmet</p>
    </header>

    <section class="panel transport-panel">
      <div class="transport-buttons">
        <button id="startButton">Start Audio</button>
        <button id="playAllButton">Play All</button>
        <button id="stopAllButton">Stop All</button>
        <button id="randomButton">Randomize</button>
      </div>
    </section>

    <section class="panel presets-panel">
      <div class="panel-head compact-head">
        <h2>presets</h2>
      </div>

      <div class="preset-buttons">
        <button class="preset-button" id="presetFog">Fog</button>
        <button class="preset-button" id="presetGlass">Glass</button>
        <button class="preset-button" id="presetUnderground">Underground</button>
        <button class="preset-button" id="presetPunch">Punch</button>
      </div>
    </section>

    <section class="panel osc-panel">
      <div class="panel-head">
        <h2>oscilloscope</h2>

        <div class="osc-tools">
          <button id="pauseOscilloscopeButton">Pause</button>
          <button id="resumeOscilloscopeButton">Resume</button>
          <button id="holdOscilloscopeButton">Hold</button>
          <button id="resetOscilloscopeZoomButton">Reset Zoom</button>
          <button id="toggleOscilloscopeGridButton">Grid</button>
        </div>
      </div>

      <div class="osc-settings-row">
        <div class="mini-control">
          <label for="oscZoomX">Zoom X</label>
          <input type="range" id="oscZoomX" min="1" max="8" step="1" value="1">
        </div>

        <div class="mini-control">
          <label for="oscZoomY">Zoom Y</label>
          <input type="range" id="oscZoomY" min="1" max="8" step="1" value="2">
        </div>

        <div class="mini-control">
          <label for="oscGlowAmount">Glow</label>
          <input type="range" id="oscGlowAmount" min="0" max="100" step="1" value="65">
        </div>

        <div class="mini-control">
          <label for="oscTrailAmount">Trail</label>
          <input type="range" id="oscTrailAmount" min="0" max="100" step="1" value="18">
        </div>

        <div class="mini-control">
          <label for="oscLineSize">Line Size</label>
          <input type="range" id="oscLineSize" min="1" max="8" step="1" value="3">
        </div>
      </div>

      <canvas id="oscilloscope" width="1400" height="320"></canvas>
    </section>

    <section class="panel spec-panel">
      <div class="panel-head">
        <h2>spectrogram</h2>

        <div class="spec-tools">
          <button id="pauseSpectrogramButton">Pause</button>
          <button id="resumeSpectrogramButton">Resume</button>
          <button id="clearSpectrogramButton">Clear</button>
        </div>
      </div>

      <div class="spectrogram-wrapper">
        <canvas id="spectrogram" width="1400" height="220"></canvas>
        <canvas id="spectrogramOverlay" width="1400" height="220"></canvas>
      </div>
    </section>

    <main class="workspace-grid">
      <aside class="left-stack">
        <section class="panel controls-panel">
          <h2>controls</h2>

          <div class="control-group">
            <label for="controlTargetSelect">Target</label>
            <select id="controlTargetSelect">
              <option value="master">Master</option>
              <option value="flute">Flute</option>
              <option value="drum">Drum</option>
              <option value="electro">Electro</option>
              <option value="bass">Bass</option>
            </select>
          </div>

          <div class="control-group">
            <label for="volumeSlider">Volume</label>
            <input type="range" id="volumeSlider" min="0" max="100" value="75">
          </div>

          <div class="control-group">
            <label for="filterSlider">Filter</label>
            <input type="range" id="filterSlider" min="0" max="100" value="50">
          </div>

          <div class="control-group">
            <label for="speedSlider">Speed</label>
            <input type="range" id="speedSlider" min="50" max="150" value="100">
          </div>

          <div class="control-group">
            <label for="distortionSlider">Distortion</label>
            <input type="range" id="distortionSlider" min="0" max="100" value="0">
          </div>
        </section>

        <section class="panel masterfx-panel">
          <h2>master fx</h2>

          <div class="control-group">
            <label for="masterReverbSlider">Reverb</label>
            <input type="range" id="masterReverbSlider" min="0" max="100" value="20">
          </div>

          <div class="control-group">
            <label for="masterDelaySlider">Delay</label>
            <input type="range" id="masterDelaySlider" min="0" max="100" value="10">
          </div>

          <div class="control-group">
            <label for="masterWidthSlider">Width</label>
            <input type="range" id="masterWidthSlider" min="0" max="100" value="50">
          </div>

          <div class="control-group">
            <label for="masterOutputSlider">Output</label>
            <input type="range" id="masterOutputSlider" min="0" max="100" value="75">
          </div>
        </section>
      </aside>

      <section class="panel sounds-panel">
        <h2>sounds</h2>

        <div class="sound-card">
          <div class="sound-head">
            <div class="sound-name">Flute</div>
            <div class="sound-actions">
              <button class="sound-toggle" id="textureAButton">OFF</button>
              <button class="eq-toggle" id="fluteEqToggle">EQ</button>
            </div>
          </div>

          <div class="loop-row">
            <div class="loop-field">
              <label for="fluteLoopEffect">Loop Effect</label>
              <select id="fluteLoopEffect">
                <option value="hitUp">Hit Up</option>
                <option value="hitDown">Hit Down</option>
                <option value="warp">Warp</option>
                <option value="muffle">Muffle</option>
                <option value="echoBurst">Echo Burst</option>
              </select>
            </div>

            <div class="loop-field">
              <label for="fluteLoopInterval">Interval (sec)</label>
              <input type="number" id="fluteLoopInterval" min="1" step="0.5" value="4">
            </div>

            <div class="loop-field">
              <label for="fluteLoopDuration">Duration (sec)</label>
              <input type="number" id="fluteLoopDuration" min="0.2" step="0.1" value="2">
            </div>

            <div class="loop-buttons">
              <button id="fluteLoopStart">Start</button>
              <button id="fluteLoopStop">Stop</button>
            </div>
          </div>

          <div class="loop-warning" id="fluteLoopWarning"></div>

          <div class="eq-drawer" id="fluteEqDrawer">
            <div class="eq-inner">
              <canvas class="eq-canvas" id="fluteEqCanvas" width="900" height="220"></canvas>
              <div class="eq-sliders">
                <div class="eq-band"><label for="fluteEq60">60</label><input type="range" id="fluteEq60" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="fluteEq250">250</label><input type="range" id="fluteEq250" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="fluteEq1000">1K</label><input type="range" id="fluteEq1000" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="fluteEq4000">4K</label><input type="range" id="fluteEq4000" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="fluteEq8000">8K</label><input type="range" id="fluteEq8000" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="fluteEq15000">15K</label><input type="range" id="fluteEq15000" min="-12" max="12" step="1" value="0"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="sound-card">
          <div class="sound-head">
            <div class="sound-name">Drum</div>
            <div class="sound-actions">
              <button class="sound-toggle" id="textureBButton">OFF</button>
              <button class="eq-toggle" id="drumEqToggle">EQ</button>
            </div>
          </div>

          <div class="loop-row">
            <div class="loop-field">
              <label for="drumLoopEffect">Loop Effect</label>
              <select id="drumLoopEffect">
                <option value="hitUp">Hit Up</option>
                <option value="hitDown">Hit Down</option>
                <option value="warp">Warp</option>
                <option value="muffle">Muffle</option>
                <option value="echoBurst">Echo Burst</option>
              </select>
            </div>

            <div class="loop-field">
              <label for="drumLoopInterval">Interval (sec)</label>
              <input type="number" id="drumLoopInterval" min="1" step="0.5" value="4">
            </div>

            <div class="loop-field">
              <label for="drumLoopDuration">Duration (sec)</label>
              <input type="number" id="drumLoopDuration" min="0.2" step="0.1" value="2">
            </div>

            <div class="loop-buttons">
              <button id="drumLoopStart">Start</button>
              <button id="drumLoopStop">Stop</button>
            </div>
          </div>

          <div class="loop-warning" id="drumLoopWarning"></div>

          <div class="eq-drawer" id="drumEqDrawer">
            <div class="eq-inner">
              <canvas class="eq-canvas" id="drumEqCanvas" width="900" height="220"></canvas>
              <div class="eq-sliders">
                <div class="eq-band"><label for="drumEq60">60</label><input type="range" id="drumEq60" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="drumEq250">250</label><input type="range" id="drumEq250" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="drumEq1000">1K</label><input type="range" id="drumEq1000" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="drumEq4000">4K</label><input type="range" id="drumEq4000" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="drumEq8000">8K</label><input type="range" id="drumEq8000" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="drumEq15000">15K</label><input type="range" id="drumEq15000" min="-12" max="12" step="1" value="0"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="sound-card">
          <div class="sound-head">
            <div class="sound-name">Electro</div>
            <div class="sound-actions">
              <button class="sound-toggle" id="textureCButton">OFF</button>
              <button class="eq-toggle" id="electroEqToggle">EQ</button>
            </div>
          </div>

          <div class="loop-row">
            <div class="loop-field">
              <label for="electroLoopEffect">Loop Effect</label>
              <select id="electroLoopEffect">
                <option value="hitUp">Hit Up</option>
                <option value="hitDown">Hit Down</option>
                <option value="warp">Warp</option>
                <option value="muffle">Muffle</option>
                <option value="echoBurst">Echo Burst</option>
              </select>
            </div>

            <div class="loop-field">
              <label for="electroLoopInterval">Interval (sec)</label>
              <input type="number" id="electroLoopInterval" min="1" step="0.5" value="4">
            </div>

            <div class="loop-field">
              <label for="electroLoopDuration">Duration (sec)</label>
              <input type="number" id="electroLoopDuration" min="0.2" step="0.1" value="2">
            </div>

            <div class="loop-buttons">
              <button id="electroLoopStart">Start</button>
              <button id="electroLoopStop">Stop</button>
            </div>
          </div>

          <div class="loop-warning" id="electroLoopWarning"></div>

          <div class="eq-drawer" id="electroEqDrawer">
            <div class="eq-inner">
              <canvas class="eq-canvas" id="electroEqCanvas" width="900" height="220"></canvas>
              <div class="eq-sliders">
                <div class="eq-band"><label for="electroEq60">60</label><input type="range" id="electroEq60" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="electroEq250">250</label><input type="range" id="electroEq250" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="electroEq1000">1K</label><input type="range" id="electroEq1000" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="electroEq4000">4K</label><input type="range" id="electroEq4000" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="electroEq8000">8K</label><input type="range" id="electroEq8000" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="electroEq15000">15K</label><input type="range" id="electroEq15000" min="-12" max="12" step="1" value="0"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="sound-card">
          <div class="sound-head">
            <div class="sound-name">Bass</div>
            <div class="sound-actions">
              <button class="sound-toggle" id="textureDButton">OFF</button>
              <button class="eq-toggle" id="bassEqToggle">EQ</button>
            </div>
          </div>

          <div class="loop-row">
            <div class="loop-field">
              <label for="bassLoopEffect">Loop Effect</label>
              <select id="bassLoopEffect">
                <option value="hitUp">Hit Up</option>
                <option value="hitDown">Hit Down</option>
                <option value="warp">Warp</option>
                <option value="muffle">Muffle</option>
                <option value="echoBurst">Echo Burst</option>
              </select>
            </div>

            <div class="loop-field">
              <label for="bassLoopInterval">Interval (sec)</label>
              <input type="number" id="bassLoopInterval" min="1" step="0.5" value="4">
            </div>

            <div class="loop-field">
              <label for="bassLoopDuration">Duration (sec)</label>
              <input type="number" id="bassLoopDuration" min="0.2" step="0.1" value="2">
            </div>

            <div class="loop-buttons">
              <button id="bassLoopStart">Start</button>
              <button id="bassLoopStop">Stop</button>
            </div>
          </div>

          <div class="loop-warning" id="bassLoopWarning"></div>

          <div class="eq-drawer" id="bassEqDrawer">
            <div class="eq-inner">
              <canvas class="eq-canvas" id="bassEqCanvas" width="900" height="220"></canvas>
              <div class="eq-sliders">
                <div class="eq-band"><label for="bassEq60">60</label><input type="range" id="bassEq60" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="bassEq250">250</label><input type="range" id="bassEq250" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="bassEq1000">1K</label><input type="range" id="bassEq1000" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="bassEq4000">4K</label><input type="range" id="bassEq4000" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="bassEq8000">8K</label><input type="range" id="bassEq8000" min="-12" max="12" step="1" value="0"></div>
                <div class="eq-band"><label for="bassEq15000">15K</label><input type="range" id="bassEq15000" min="-12" max="12" step="1" value="0"></div>
              </div>
            </div>
          </div>
        </div>

      </section>
    </main>
  </div>
  <section class="bottom-lab-grid">

  <section class="panel tweaks-panel">
    <h2>texture tweaks</h2>

    <div class="tweak-grid">
      <div class="tweak-row">
        <label for="driftSlider">Drift</label>
        <input type="range" id="driftSlider" min="0" max="100" value="18">
        <input type="number" id="driftValue" min="0" max="100" value="18">
      </div>

      <div class="tweak-row">
        <label for="smearSlider">Smear</label>
        <input type="range" id="smearSlider" min="0" max="100" value="24">
        <input type="number" id="smearValue" min="0" max="100" value="24">
      </div>

      <div class="tweak-row">
        <label for="grainSlider">Grain</label>
        <input type="range" id="grainSlider" min="0" max="100" value="32">
        <input type="number" id="grainValue" min="0" max="100" value="32">
      </div>

      <div class="tweak-row">
        <label for="crushSlider">Crush</label>
        <input type="range" id="crushSlider" min="0" max="100" value="10">
        <input type="number" id="crushValue" min="0" max="100" value="10">
      </div>

      <div class="tweak-row">
        <label for="stretchSlider">Stretch</label>
        <input type="range" id="stretchSlider" min="0" max="100" value="20">
        <input type="number" id="stretchValue" min="0" max="100" value="20">
      </div>

      <div class="tweak-row">
        <label for="motionSlider">Motion</label>
        <input type="range" id="motionSlider" min="0" max="100" value="28">
        <input type="number" id="motionValue" min="0" max="100" value="28">
      </div>

      <div class="tweak-row">
        <label for="blurSlider">Blur</label>
        <input type="range" id="blurSlider" min="0" max="100" value="16">
        <input type="number" id="blurValue" min="0" max="100" value="16">
      </div>

      <div class="tweak-row">
        <label for="flutterSlider">Flutter</label>
        <input type="range" id="flutterSlider" min="0" max="100" value="12">
        <input type="number" id="flutterValue" min="0" max="100" value="12">
      </div>
    </div>
  </section>

  <section class="panel mix-panel">
    <h2>mix lab</h2>

    <div class="mix-grid">
      <div class="mix-row">
        <label for="dryWetSlider">Dry / Wet</label>
        <input type="range" id="dryWetSlider" min="0" max="100" value="35">
        <input type="number" id="dryWetValue" min="0" max="100" value="35">
      </div>

      <div class="mix-row">
        <label for="glueSlider">Glue</label>
        <input type="range" id="glueSlider" min="0" max="100" value="22">
        <input type="number" id="glueValue" min="0" max="100" value="22">
      </div>

      <div class="mix-row">
        <label for="widthMixSlider">Width</label>
        <input type="range" id="widthMixSlider" min="0" max="100" value="58">
        <input type="number" id="widthMixValue" min="0" max="100" value="58">
      </div>

      <div class="mix-row">
        <label for="punchSlider">Punch</label>
        <input type="range" id="punchSlider" min="0" max="100" value="40">
        <input type="number" id="punchValue" min="0" max="100" value="40">
      </div>

      <div class="mix-row">
        <label for="airSlider">Air</label>
        <input type="range" id="airSlider" min="0" max="100" value="26">
        <input type="number" id="airValue" min="0" max="100" value="26">
      </div>

      <div class="mix-row">
        <label for="lowWeightSlider">Low Weight</label>
        <input type="range" id="lowWeightSlider" min="0" max="100" value="54">
        <input type="number" id="lowWeightValue" min="0" max="100" value="54">
      </div>

      <div class="mix-row">
        <label for="noiseFloorSlider">Noise Floor</label>
        <input type="range" id="noiseFloorSlider" min="0" max="100" value="8">
        <input type="number" id="noiseFloorValue" min="0" max="100" value="8">
      </div>

      <div class="mix-row">
        <label for="crossmixSlider">Crossmix</label>
        <input type="range" id="crossmixSlider" min="0" max="100" value="18">
        <input type="number" id="crossmixValue" min="0" max="100" value="18">
      </div>
    </div>
  </section>

</section>


  <script src="https://unpkg.com/tone"></script>
  <script src="app.js"></script>
</body>
</html>
